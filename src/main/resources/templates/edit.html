<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Modifier tâche</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <h2>Modifier tâche</h2>

    <form action="/update" method="post">

        <input type="hidden" name="id" th:value="${task.id}">

        <div class="mb-3">

            <label>Titre</label>

            <input type="text" name="title" class="form-control" th:value="${task.title}">

        </div>

        <div class="mb-3">

            <label>Description</label>

            <input type="text" name="description" class="form-control" th:value="${task.description}">

        </div>

        <div class="mb-3">

            <label>Status</label>

            <input type="text" name="status" class="form-control" th:value="${task.status}">

        </div>

        <button class="btn btn-success">Modifier</button>

        <a href="/" class="btn btn-secondary">Retour</a>

    </form>

</div>

</body>
</html>
