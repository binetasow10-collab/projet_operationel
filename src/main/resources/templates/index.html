<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Gestion des tâches</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center">Liste des tâches</h2>

    <a href="/add" class="btn btn-primary mb-3">Ajouter une tâche</a>

    <table class="table table-bordered">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="task : ${tasks}">

            <td th:text="${task.id}"></td>
            <td th:text="${task.title}"></td>
            <td th:text="${task.description}"></td>
            <td th:text="${task.status}"></td>

            <td>

                <a th:href="@{/edit/{id}(id=${task.id})}" class="btn btn-warning btn-sm">Edit</a>

                <a th:href="@{/delete/{id}(id=${task.id})}" class="btn btn-danger btn-sm">Delete</a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
